<!DOCTYPE html>
 <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="style.css">
        <title>Focus Garden</title>
    </head>
    <body>
        <div id="focus-app" class="focus-garden">
            <div class="garden"></div>
            <div class="timer">
                <div id="pomodoro-timer" class="timer-display">
                    <h1 id="time-display" class="time">25:00</h1>
                </div>
            </div>
            <div class="buttons">
                <button id="start">START</button>
                <button id="pause">PAUSE</button>
                <button id="reset">RESET</button>
            </div>
            <div class="todos-container">
                <form id="task-form" class="input-area">
                    <input type="text" id="task-input" placeholder="Add a new task..." required>
                    <button type="submit" id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
                </form>
                <ul id="task-list">
                </ul>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
 </html>
